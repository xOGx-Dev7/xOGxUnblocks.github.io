<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Arcade Hub</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070b;
        --panel: rgba(18, 22, 34, 0.95);
        --text: #f4f7ff;
        --muted: #98a4c2;
        --accent: #7c5cff;
        --accent-2: #24d0ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top left, #1a2038, var(--bg));
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
      }
      .wrap { max-width: 1100px; margin: 0 auto; }
      .hero {
        background: linear-gradient(135deg, rgba(18,22,34,0.96), rgba(8,10,18,0.98));
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      h1 { font-size: clamp(1.8rem, 3.5vw, 2.8rem); margin: 0 0 10px; }
      .sub { color: var(--muted); line-height: 1.6; max-width: 700px; }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom: 18px; flex-wrap:wrap; }
      .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.07); color:#cdd7ff; font-size: .8rem; }
      .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-top: 18px; }
      .card {
        background: linear-gradient(135deg, var(--panel), rgba(10,12,22,0.98));
        border-radius: 16px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.08);
      }
      .icon { font-size: 1.6rem; margin-bottom: 8px; }
      .card h3 { margin: 0 0 6px; font-size: 1rem; }
      .card p { margin: 0; color: var(--muted); font-size: .9rem; line-height: 1.45; }
      .tag { display:inline-block; padding:4px 8px; border-radius:999px; background:rgba(255,255,255,.07); color:#dfe5ff; font-size: .72rem; margin-top: 10px; }
      .search {
        width:100%; padding: 10px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color:white; margin-top: 12px;
      }
      .section { margin-top: 22px; }
      .section h2 { margin-bottom: 8px; }
      @media (max-width: 700px) { body { padding: 12px; } .hero { padding: 16px; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div class="topbar">
          <div class="pill">Local-only • No external assets</div>
          <div class="pill">Open by double-clicking this file</div>
        </div>
        <h1>Neon Arcade Hub</h1>
        <p class="sub">A dark, polished entertainment portal you can run locally from your device. This version works without a website address, so it won’t depend on a blocked URL.</p>
        <input class="search" id="search" placeholder="Search by title or type..." />
      </section>

      <section class="section">
        <h2>Horror</h2>
        <div class="grid" id="horror"></div>
      </section>

      <section class="section">
        <h2>Multiplayer</h2>
        <div class="grid" id="multiplayer"></div>
      </section>

      <section class="section">
        <h2>Shooting</h2>
        <div class="grid" id="shooting"></div>
      </section>
    </div>

    <script>
      const games = [
        { title: 'Midnight Escape', category: 'horror', icon: '👻', desc: 'Survive the clinic before the lights die.' },
        { title: 'Ghost Sprint', category: 'horror', icon: '🕯️', desc: 'Outrun the shadows in a cursed maze.' },
        { title: 'Shadow Ops', category: 'horror', icon: '🌙', desc: 'Stealth thriller with ghostly enemies.' },
        { title: 'Arena Clash', category: 'multiplayer', icon: '⚔️', desc: 'Team up or duel in a neon arena.' },
        { title: 'Pixel Dash', category: 'multiplayer', icon: '🚀', desc: 'Race and battle in fast online rounds.' },
        { title: 'Base Builders', category: 'multiplayer', icon: '🧱', desc: 'Forge defenses and outsmart rivals.' },
        { title: 'Blast Zone', category: 'shooting', icon: '🔫', desc: 'Arcade shooting with precision movement.' },
        { title: 'Sniper Rush', category: 'shooting', icon: '🎯', desc: 'Pure reflexes and target tracking.' },
        { title: 'Skyfire', category: 'shooting', icon: '☄️', desc: 'Dogfight across a glowing skyline.' }
      ];

      function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const groups = { horror: [], multiplayer: [], shooting: [] };

        games.forEach((game) => {
          const match = `${game.title} ${game.desc} ${game.category}`.toLowerCase().includes(query);
          if (match) groups[game.category].push(game);
        });

        Object.keys(groups).forEach((key) => {
          const container = document.getElementById(key);
          container.innerHTML = '';
          groups[key].forEach((game) => {
            const card = document.createElement('article');
            card.className = 'card';
            card.innerHTML = `
              <div class="icon">${game.icon}</div>
              <h3>${game.title}</h3>
              <p>${game.desc}</p>
              <span class="tag">${game.category}</span>
            `;
            container.appendChild(card);
          });
        });
      }

      document.getElementById('search').addEventListener('input', render);
      render();
    </script>
  </body>
</html>
